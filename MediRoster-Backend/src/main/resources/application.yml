# MediRoster 后端 — 敏感信息请使用环境变量，勿提交密钥
spring:
  application:
    name: mediroster-backend

  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

  datasource:
    # characterEncoding 须为 Java Charset 名（UTF-8）；不能写 utf8mb4。
    # 勿在 URL 中加 connectionCollation=...utf8mb4...，驱动会据此把编码设成 utf8mb4，触发 UnsupportedEncodingException。
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:mediroster}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:lidengfu1993}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${SERVER_PORT:8084}

# OpenAPI / Swagger UI：联调与导出给前端
springdoc:
  api-docs:
    path: /api/v1/openapi
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

logging:
  level:
    root: INFO
    com.mediroster: DEBUG
